name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

# Annule les runs en cours quand un nouveau commit arrive sur la même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --verbose

  audit:
    name: Cargo audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # Fails the build if any known vulnerability is found in the dependency
        # tree. Dependabot covers GitHub-side scanning; this catches CVEs at PR
        # time before merge.
        run: cargo audit --deny warnings

  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        # Two passes share the same instrumented data: --no-report collects,
        # then `report` formats. Cheaper than running the test suite twice.
        # main.rs is bootstrap (sentry init, lambda detection) and is not
        # reachable from the test process; excluding it makes the threshold
        # reflect actual logic coverage.
        run: |
          cargo llvm-cov --no-report --all-targets
          cargo llvm-cov report \
            --ignore-filename-regex 'main\.rs' \
            --summary-only \
            --fail-under-lines 90 \
            | tee coverage.txt
      - name: Publish coverage to job summary
        if: always()
        run: |
          {
            echo '## Test coverage'
            echo ''
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
